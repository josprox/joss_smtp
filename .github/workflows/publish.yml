name: Publish JP v2

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/publish.yml'
      - 'joss.yaml'
      - 'src/**'
      - 'cmd/**'
      - 'go.mod'
      - 'go.sum'
      - '*.go'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: Package and validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      plugin_name: ${{ steps.manifest.outputs.name }}
      plugin_version: ${{ steps.manifest.outputs.version }}
      release_tag: ${{ steps.manifest.outputs.tag }}
      should_release: ${{ steps.version_guard.outputs.should_release }}

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Read manifest version
        id: manifest
        shell: bash
        run: |
          name="$(awk -F': *' '$1 == "name" { print $2; exit }' joss.yaml | tr -d '[:space:]')"
          version="$(awk -F': *' '$1 == "version" { print $2; exit }' joss.yaml | tr -d '[:space:]')"
          if [[ -z "$name" || -z "$version" || ! "$version" =~ ^[0-9]+\\.[0-9]+\\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "joss.yaml debe declarar name y una version SemVer valida." >&2
            exit 1
          fi
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Enforce immutable version tags
        id: version_guard
        shell: bash
        run: |
          tag="${{ steps.manifest.outputs.tag }}"
          if ! git show-ref --verify --quiet "refs/tags/$tag"; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          tag_commit="$(git rev-list -n 1 "$tag")"
          if [[ "$tag_commit" == "$GITHUB_SHA" ]]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "La version $tag ya existe para otro commit. Incrementa version en joss.yaml antes de publicar." >&2
          exit 1

      - name: Compile plugin sidecars
        shell: bash
        run: |
          name="${{ steps.manifest.outputs.name }}"
          for target in windows/amd64 windows/arm64 linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            IFS=/ read -r goos goarch <<< "$target"
            output="native/$goos-$goarch/$name"
            if [[ "$goos" == "windows" ]]; then output="$output.exe"; fi
            mkdir -p "$(dirname "$output")"
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" go build -trimpath -ldflags="-s -w" -o "$output" ./cmd/sidecar
          done

      - name: Verify sidecar source
        run: go test ./...

      - name: Checkout Joss compiler
        uses: actions/checkout@v4
        with:
          repository: josprox/Joss-language
          ref: main
          path: joss-core

      - name: Build JP v2 and inspect archive
        shell: bash
        run: |
          name="${{ steps.manifest.outputs.name }}"
          (cd joss-core && go run ./cmd/joss build package "$GITHUB_WORKSPACE")
          (cd joss-core && go run ./cmd/joss package inspect "$GITHUB_WORKSPACE/$name.jp")
          mkdir -p release
          cp "$name.jp" "release/$name.jp"
          sha256sum "release/$name.jp" > "release/$name-${{ steps.manifest.outputs.version }}-sha256.txt"

      - name: Upload packaged JP
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.manifest.outputs.name }}-${{ steps.manifest.outputs.version }}
          path: release/
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: package
    if: needs.package.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download JP release files
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.package.outputs.plugin_name }}-${{ needs.package.outputs.plugin_version }}
          path: release

      - name: Create immutable version release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.package.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.package.outputs.plugin_name }} ${{ needs.package.outputs.plugin_version }}
          generate_release_notes: true
          files: release/*
