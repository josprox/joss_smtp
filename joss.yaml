name: joss_smtp
version: 2.0.0
description: Plugin oficial para envío de correos electrónicos vía SMTP en Joss.
repository: https://github.com/josprox/joss_smtp
license: MIT
type: joss
environment:
  joss: ">=3.6.0"
entry:
  main: src/plugin.joss
native:
  protocol: joss-rpc-v1
  windows-amd64: native/windows-amd64/joss_smtp.exe
  windows-arm64: native/windows-arm64/joss_smtp.exe
  linux-amd64: native/linux-amd64/joss_smtp
  linux-arm64: native/linux-arm64/joss_smtp
  darwin-amd64: native/darwin-amd64/joss_smtp
  darwin-arm64: native/darwin-arm64/joss_smtp
dependencies:
